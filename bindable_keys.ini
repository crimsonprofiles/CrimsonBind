# Key pool for Sync-CrimsonBinds randomizer.
# Unmodified [BaseKeys] are NOT assigned alone — only combinations with [Modifiers] (e.g. ALT-T, CTRL-SHIFT-PAGEUP).
# CTRL-MINUS is excluded (WoW client is unreliable); other *-MINUS combos (e.g. CTRL-SHIFT-MINUS) stay in the pool.
# Numpad is intentionally omitted from the randomizer pool (add under [ExplicitKeys] only if you need a specific bind).
# [ExcludedBaseKeys]: never use this base with any modifier (movement / action bar row). Edit to taste.
# Add rare bare keys under [ExplicitKeys] if you need them.

